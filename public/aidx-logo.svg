  <line x1="27" y1="5" x2="5" y2="27" stroke="#063970" stroke-width="5" stroke-linecap="round"/>
  <!-- Speed lines: 3 horizontal trails, decreasing length + opacity -->
  <line x1="1" y1="11" x2="8" y2="11" stroke="#063970" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
  <line x1="1" y1="16" x2="6" y2="16" stroke="#063970" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
  <line x1="1" y1="21" x2="4.5" y2="21" stroke="#063970" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>
